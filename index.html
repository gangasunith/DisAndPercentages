<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>latest</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="super-class">
    <div class="page-header">
      <span class="back-btn" onclick="goBack()"><i style="font-size:28px" class="fa">&#xf0a8;</i></span>
      <div class="header-text">
        <h1>Calculate discounts from price and percentage</h1>
      </div>
    </div>

    <div class="app-container">
      <div class="scene">
        <div class="scene-content">
          <div class="floating-controls">
            <button class="floating-btn" onclick="resetGame()" title="Reset Game"><i style="font-size:20px"
                class="fa">&#xf021;</i></button>
            <button class="floating-btn" onclick="toggleSound()" id="soundBtn" title="Toggle Sound"><i
                style="font-size:20px" class="fa">&#xf028;</i></button>
            <button class="floating-btn" id="fsBtn" onclick="toggleFullscreen()" title="Fullscreen"><i
                style="font-size:24px" class="material-icons">fullscreen</i></button>
          </div>

          <div class="shelf-area">
            <div class="toys-row">
              <div class="toy-item" id="toy-0"><span class="toy-emoji">⚽</span><span class="toy-name">Ball</span></div>
              <div class="toy-item" id="toy-1"><span class="toy-emoji">🪆</span><span class="toy-name">Doll</span></div>
              <div class="toy-item" id="toy-2"><span class="toy-emoji">🤖</span><span class="toy-name">Robot</span>
              </div>
              <div class="toy-item" id="toy-3"><span class="toy-emoji">🧸</span><span class="toy-name">Teddy</span>
              </div>
              <div class="toy-item" id="toy-4"><span class="toy-emoji">🚗</span><span class="toy-name">Car</span></div>
              <div class="toy-item" id="toy-5"><span class="toy-emoji">🎮</span><span class="toy-name">Game</span></div>
              <div class="toy-item" id="toy-6"><span class="toy-emoji">🪀</span><span class="toy-name">Yoyo</span></div>
            </div>
          </div>

          <!-- <div class="shelf-plank"></div> -->

          <div class="price-card-area">
            <div class="q-label pop" id="qlabel"></div>
          </div>

          <div class="integrated-ruler-container" id="ruler-container">
            <!-- Percentage Ruler (Top) - Stretches with the thumb -->
            <div class="ruler-row pct-row" id="ruler-row-pct">
              <div class="ruler-icon-cell">%</div>
              <div class="ruler-track-cell">
                <div class="track-outer" id="pct-track" style="width: 80%;">
                  <div class="tick-row-static" id="pct-labels">
                    <span>0%</span><span>10%</span><span>20%</span><span>30%</span><span>40%</span><span>50%</span><span>60%</span><span>70%</span><span>80%</span><span>90%</span><span>100%</span>
                  </div>
                  <div class="dynamic-ticks-container" id="pct-ticks"></div>
                  <div class="track-fill pct-fill" id="pct-fill"></div>
                  <!-- The Green Glowing Marker from the image -->
                  <div class="thumb master-marker" id="master-marker">
                    <div class="glow-dot"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Price Ruler (Bottom) - Fixed Track, Dynamic Ticks -->
            <div class="ruler-row mrp-row" id="ruler-row-price">
              <div class="ruler-icon-cell">₹</div>
              <div class="ruler-track-cell" style="position:relative;">
                <div class="dynamic-ticks-container" id="mrp-ticks"></div>
                <!-- Answer pointer: OUTSIDE mrp-ticks so it survives innerHTML clears -->
                <div class="answer-pointer" id="answer-pointer" style="display:none;">
                  <div class="answer-pointer-line"></div>
                  <div class="answer-pointer-label" id="answer-pointer-label"></div>
                </div>
                <div class="track-outer full-width-track">
                  <div class="target-marker" id="price-marker"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="input-row">
            <span class="qlbl">Discount amount = ₹</span>
            <div class="opts" id="opts"></div>
            <div class="attempts-row">
              <span class="att-label">Attempts:</span>
              <div class="att-dot" id="att-0"></div>
              <div class="att-dot" id="att-1"></div>
              <div class="att-dot" id="att-2"></div>
              <button class="nxtbtn" id="nxtbtn" onclick="nextQ()">Next toy →</button>
            </div>
            <div class="feedback-row">
              <div class="fb" id="fb"></div>
              <div class="hint" id="hint"></div>
            </div>
          </div>

          <div class="sbar">
            <span class="stxt">Score: <b id="sc">0</b> / 7</span>
            <div class="dots" id="dots"></div>
            <span class="stxt">Q <b id="qn">1</b> / 7</span>
          </div>


        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
